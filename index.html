<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>OpenMicroChat</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- 认证页面（全屏，未登录时显示） -->
    <div id="auth-overlay" class="auth-overlay">
        <!-- 由 auth.js 动态渲染 -->
    </div>

    <div class="chat-app" id="app" role="application" aria-label="聊天应用">
        <div class="app-content">
            <!-- 左侧联系人列表 -->
            <aside class="contacts-sidebar" id="contacts-sidebar" role="navigation" aria-label="联系人列表">
                <div class="sidebar-header">
                    <div class="sidebar-header-top">
                        <h2 class="app-title">OpenMicroChat</h2>
                        <button class="avatar-btn" id="user-avatar-btn" aria-label="用户菜单">
                            <span class="avatar-placeholder">U</span>
                        </button>
                    </div>
                    <div class="search-box">
                        <input type="text" placeholder="搜索联系人" id="search-input" aria-label="搜索联系人" autocomplete="off">
                    </div>
                </div>
                <div class="tag-filter-bar" id="tag-filter-bar">
                    <!-- 由 tags.js 动态渲染标签胶囊 -->
                </div>
                <div class="venn-container" id="venn-container">
                    <!-- 由 venn.js 动态渲染韦恩图 -->
                </div>
                <div class="contacts-list" id="contacts-list" role="list" aria-label="联系人">
                    <!-- 由 contacts.js 动态渲染 -->
                </div>
            </aside>

            <!-- 右侧内容区域 -->
            <main class="main-content" id="main-content">
                <!-- 空状态（未选择联系人） -->
                <div class="empty-state" id="empty-state">
                    <div class="empty-state-icon">
                        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                        </svg>
                    </div>
                    <p class="empty-state-text">选择一个联系人开始聊天</p>
                </div>

                <!-- 聊天窗口 -->
                <div class="chat-window" id="chat-window" style="display:none" role="region" aria-label="聊天窗口">
                    <div class="chat-header" id="chat-header">
                        <!-- 由 chat.js 动态渲染 -->
                    </div>
                    <div class="chat-messages" id="messages-container">
                        <!-- 由 chat.js 动态渲染 -->
                    </div>
                    <div class="chat-input-area">
                        <div class="input-tools">
                            <button class="tool-btn" id="attach-button" aria-label="添加附件">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path>
                                </svg>
                            </button>
                            <button class="tool-btn" id="image-button" aria-label="发送图片">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                                    <circle cx="8.5" cy="8.5" r="1.5"></circle>
                                    <polyline points="21 15 16 10 5 21"></polyline>
                                </svg>
                            </button>
                            <button class="tool-btn" id="voice-button" aria-label="发送语音">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"></path>
                                    <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                                    <line x1="12" y1="19" x2="12" y2="22"></line>
                                </svg>
                            </button>
                        </div>
                        <div class="input-container">
                            <textarea id="message-input" placeholder="输入消息..." class="message-input" aria-label="输入消息" rows="1"></textarea>
                            <button id="send-button" class="send-btn" aria-label="发送消息">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                                    <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path>
                                </svg>
                            </button>
                        </div>
                    </div>
                </div>

                <!-- 设置页面（动态内容） -->
                <div class="settings-page" id="settings-page" style="display:none" role="region" aria-label="设置页面">
                    <!-- 由 settings.js 动态渲染 -->
                </div>
            </main>
        </div>
    </div>

    <!-- 移动端返回按钮（聊天视图中显示） -->
    <button class="mobile-back-btn" id="mobile-back-btn" aria-label="返回联系人列表" style="display:none">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
    </button>

    <script type="module" src="src/main.js"></script>
</body>
</html>
